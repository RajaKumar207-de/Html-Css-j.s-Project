<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container ">
        <h2> Student Registration Form</h2>
        <form>
            <div class=" Form-group">
                <label>Name</label>
                <input type="text"placeholder="enter your name">
            </div>
            <div class="Form-group">
                <label>Father Name</label>
                <input type="text" placeholder="Enter your father name">
             </div>
<div class="Form-group">
    <label>E-mail</label>
    <input type="text" placeholder="Enter your E-mail">
    </div>
    <div class="Form-group">
        <label>Personal Address</label>
        <input type="text">

    </div>
    <div class="Form-group">
        <label>Gender</label>
        <div class="radio-group">
            <label><input type="radio" name="gender">Male</label>
            <label><input type="radio" name="gender">Female</label>
        </div>
    </div>
<div class="Form-group">
    <label>City</label>
    <select>
        <option>select...</option>
        <option>Bhopal</option>
        <option>Bihar</option>
        <option>Patna</option>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>
</div>
<div class="Form-group">
    <label>Course</label>
    <select>
        <option>Select...</option>
        <option>BCA</option>
        <option>MACA</option>
        <option> B.TECH</option>
        <option> LAW</option>
        <option> MEDICAL</option>
 </select>
</div>
<div class="Form-group">
    <label>District</label>
    <select>
        <option>Select...</option>
        <option>District1</option>
        <option>District2</option>
        <option>District3</option>
        <option>District4</option>
        <option>District5</option>
    </select>
</div>
<div class="Form-group">
    <label>Mobile No</label>
    <input type="text" placeholder="Enter mobile number">
</div>
<div class="buttons">
    <button type="reset" class="reset">Reset</button>
    <button type="submit" class="reset">Sumbit Form</button>
</div>
            </form>
</body>
</html>
