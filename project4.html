<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Signup</title>
  <link rel="stylesheet" href="project4.css">
</head>
<body>

<div class="container">

  <div class="signup-box">
    <h1 class="logo">Instagram</h1>

    <p class="subtitle">Sign up to see photos and videos from your friends.</p>

    <button class="fb-btn">Log in with Facebook</button>

    <div class="divider">
      <span>OR</span>
    </div>

    <form>
      <input type="text" placeholder="Mobile Number or Email" required>
      <input type="text" placeholder="Full Name" required>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <p class="terms">
      By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.
    </p>
  </div>

  <div class="login-box">
    <p>Have an account? <a href="#">Log in</a></p>
  </div>

</div>

</body>
</html>
