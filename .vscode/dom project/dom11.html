<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="dom11.css">
</head>

<body>

    <div class="card">

        <div class="search">

            <input 
                id="cityName"
                type="text"
                placeholder="Enter city name"
                spellcheck="false"
            >

            <button type="submit">

                <img src="https://i.pinimg.com/736x/f8/50/fe/f850fea80e32fa517628e0e8540756b6.jpg">

            </button>

        </div>

        <div class="weather">

            <img 
                src="https://i.pinimg.com/1200x/c4/92/49/c49249f050f60d6f7925e9e579c15c93.jpg" 
                class="weather-icon"
            >

            <h1 class="temp">22°C</h1>

            <h2 class="city">New York</h2>

            <div class="details">

                <div class="col">

                    <img src="https://i.pinimg.com/736x/42/cc/6b/42cc6bcfd3ddd23e22a62aedc1fd40b4.jpg">

                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>

                </div>
<div class="col">
    <img src="https://i.pinimg.com/1200x/ea/ef/16/eaef16bcae56f2fb7c2111cd8be32341.jpg">
</div>
<p class="wind">15km/h</p>
<p>wind Speed</p>
            </div>

        </div>

    </div>

    <script src="dom11.js"></script>

</body>
</html>
