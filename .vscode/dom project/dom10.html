<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main">
  <div id="card">

    <div id="img-container">
      <img id="profile" src="https://i.pinimg.com/736x/36/a1/c7/36a1c7117b19e75eb5a857efd2294405.jpg">
      <span id="heart">❤️</span>
    </div>

    <h1>Your_Shubh01</h1>
    <h5 id="status">Stranger</h5>

    <p id="likes">❤️ Likes: 0</p>

    <div id="btn-container">
      <button id="remove">Remove</button>
      <button id="add">Add Friend</button>
      <button id="dark">🌙</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
