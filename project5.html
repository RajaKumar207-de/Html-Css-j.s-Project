<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form  </title>
    <link rel="stylesheet" href="project5.css">
</head>
<body>
   <div class="container ">
        <h2> Student Registration Form</h2>
        <form>
            <div class=" Form-group">
                <label>Name</label>
                <input type="text"placeholder="Enter your name">
                <div class="Form-group">
                    <label>Father's Name </label>
                    <input type="text"placeholder="Enter your father name">
                </div>
                <div class="Form-group">
                    <label>Mother's Name</label>
                    <input type="text"placeholder="Enter your mothers name ">
                </div>
                <div class=" Form-group">
                    <label>Phone No :</label>
                    <input type="text" required>
                </div>
    <div class="Form-group">
        <label>E-mail</label>
        <input type="text" required>
    </div>
    <div class="Form-group">
        <label>D.O.B</label>
        <input type="date" required>
    </div>
    <div class="Form-group">
        <label>Gender</label><br>
        <input type="radio" id="Male" name="gender"value="male"  required>Male
        <input type="radio" id ="Female"name="gender"value="Female" required>Female
        <input type="radio" id ="Other" name="gender"value="Other"required>Other
    </div>
    <div class="Form-group">
  <input type="checkbox" id="terms" required>
  <label for="terms">Accept Terms & Conditions</label>
</div>
<div class=" button">
    <input type="submit" id="button" required>
</div>
    <button type="button">Cancel</button>

</div>
</body>
</html>
